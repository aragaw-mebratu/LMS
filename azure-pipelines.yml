trigger:
- master

variables:
  BACKEND_IMAGE: aragawmebratu/lms-backend
  FRONTEND_IMAGE: aragawmebratu/lms-frontend
  IMAGE_TAG: $(Build.BuildId)

stages:
- stage: BuildAndPublish
  displayName: Build, Push, and Publish Artifacts
  jobs:
  - job: Docker
    displayName: Docker Build Job
    pool:
      name: SelfHosted

    steps:
    - checkout: self

    # 🔐 Docker Hub Login
    - task: Docker@2
      displayName: Docker Hub Login
      inputs:
        command: login
        containerRegistry: DockerHub

    # 📝 Generate .env dynamically (secure secrets from pipeline variables)
    - task: Bash@3
      displayName: Generate backend.env
      inputs:
        targetType: inline
        script: |
          ARTIFACT_DIR=$(wslpath "$(Build.ArtifactStagingDirectory)")
          mkdir -p "$ARTIFACT_DIR"
          ENV_FILE="$ARTIFACT_DIR/backend.env"

          cat <<EOF > "$ENV_FILE"
          MAILGUN_API_KEY=$(MAILGUN_API_KEY)
          MAILERSEND_API_TOKEN=$(MAILERSEND_API_TOKEN)
          MAILGUN_SENDER_DOMAIN=$(MAILGUN_SENDER_DOMAIN)
          FROM_EMAIL=$(FROM_EMAIL)
          DJANGO_DEBUG=$(DJANGO_DEBUG)
          DJANGO_SECRET_KEY=$(DJANGO_SECRET_KEY)
          DJANGO_ALLOWED_HOSTS=$(DJANGO_ALLOWED_HOSTS)
          EOF

          echo "Generated .env file:"
          cat "$ENV_FILE"

    # 🐳 Build & Push Docker Image
    - task: Docker@2
      displayName: Build & Push Backend Image
      inputs:
        command: buildAndPush
        repository: $(BACKEND_IMAGE)
        dockerfile: Dockerfile.backend
        tags: |
          $(IMAGE_TAG)
          latest

    # 🐳 Frontend image
    - task: Docker@2
      displayName: Build & Push Frontend Image
      inputs:
        command: buildAndPush
        repository: $(FRONTEND_IMAGE)
        dockerfile: Dockerfile.frontend
        tags: |
          $(IMAGE_TAG)
          latest

    # 📝 Inject tags into docker-compose.yml
    - task: Bash@3
      displayName: Inject image tags
      inputs:
        targetType: inline
        script: |
          SRC=$(wslpath "$(Build.SourcesDirectory)/docker-compose.yml")
          OUT_DIR=$(wslpath "$(Build.ArtifactStagingDirectory)")
          OUT="$OUT_DIR/docker-compose.yml"

          mkdir -p "$OUT_DIR"

          sed -e "s|\${BACKEND_IMAGE_TAG}|$(IMAGE_TAG)|g" \
              -e "s|\${FRONTEND_IMAGE_TAG}|$(IMAGE_TAG)|g" \
              "$SRC" > "$OUT"

    # 📦 Publish docker-compose.yml and backend.env as artifacts
    - task: PublishBuildArtifacts@1
      displayName: Publish docker-compose and .env artifacts
      inputs:
        PathtoPublish: $(Build.ArtifactStagingDirectory)
        ArtifactName: docker-compose
        publishLocation: Container
